services:
  qwen36-exl3:
    image: ghcr.io/theroyallab/tabbyapi:latest
    ports:
      - "8686:8686"
    # GPU access (Docker + NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NAME=TabbyAPI
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./models/Qwen3.6-27B-exl3-4.15bpw:/app/models/Qwen3.6-27B-exl3-4.15bpw:ro
      - ./config/config.yml:/app/config.yml:ro
      - ./config/api_tokens.yml:/app/api_tokens.yml

  searxng:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    restart: always
    ports:
      - ${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-8080}:${SEARXNG_PORT:-8080}
    env_file: ./.env
    volumes:
      - ./searxng-core-config/:/etc/searxng/:Z
      - core-data:/var/cache/searxng/

  mcp-searxng:
    profiles:
      - mcp
    image: isokoliuk/mcp-searxng:latest
    stdin_open: true
    environment:
      - SEARXNG_URL=http://searxng:${SEARXNG_PORT:-8080}

volumes:
  core-data:
